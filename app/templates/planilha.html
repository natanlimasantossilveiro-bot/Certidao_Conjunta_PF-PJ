<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Processamento por Planilha</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body class="internal-page">

    <header class="topbar">
        <div class="brand">Certidão — Conjunta</div>

        <nav>
            <a href="/">Início</a>
            <a href="/manual">Manual</a>
            <a href="/planilha">Planilha</a>
            <a href="/historico">Histórico</a>
        </nav>
    </header>

    <main class="internal-shell">

        <section class="internal-hero green-section">
            <h1>Processamento por Planilha</h1>

            <p>
                Realize emissões em lote utilizando uma planilha Excel
                contendo os dados dos contribuintes.
            </p>
        </section>

        <section class="form-section light-green-section">

            <div class="form-card">

                <form
                    method="post"
                    action="/processar-planilha"
                    enctype="multipart/form-data"
                    onsubmit="mostrarLoading()"
                >

                    <div class="form-group">

                        <label for="planilha">
                            Selecione a planilha Excel
                        </label>

                        <input
                            type="file"
                            name="planilha"
                            id="planilha"
                            accept=".xlsx"
                            required
                        >

                    </div>

                    <div class="actions">

                        <button type="submit">
                            Processar planilha
                        </button>

                        <a href="/">
                            <button type="button">
                                Voltar
                            </button>
                        </a>

                    </div>

                </form>

            </div>

        </section>

    </main>

    <div id="loading" class="loading-overlay" style="display: none;">
        <div class="loading-card">

            <div class="spinner"></div>

            <h2>Processando planilha...</h2>

            <p>
                Aguarde enquanto os registros são processados
                e as certidões são emitidas.
            </p>

        </div>
    </div>

    <script>
        function mostrarLoading() {
            document.getElementById("loading").style.display = "flex";
        }
    </script>

</body>
</html>
